name: Unpublish NPM Version

on:
  workflow_dispatch:

jobs:
  unpublish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Unpublish version 0.7.1
        run: npm unpublish @darkrei08/wizard-ai-cli@0.7.1 --force
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
