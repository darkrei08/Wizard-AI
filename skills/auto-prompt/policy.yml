# LLM Routing Policy for wz-ai-prompt
# This file defines the behavior for the XML structuring middleware.
# It enforces a multi-level fallback strategy integrating the latest providers.
# 1. Primary fast/cheap model for standard prompt rewriting.
# 2. Large context model for big inputs.
# 3. Fallback chains across OpenAI, Anthropic, Google, DeepSeek, Qwen, and MiniMax.

routing:
  thresholds:
    large_context_tokens: 8000

  models:
    # Default fast model for everyday rewriting (High speed, low cost)
    primary:
      id: "gemini-flash-latest"
      fallback_1: "claude-haiku-latest"
      fallback_2: "gpt-5o-mini-latest"
      fallback_3: "deepseek-v4-chat"
    
    # Selected if input tokens > large_context_tokens (High context window)
    large_context:
      id: "gemini-pro-latest"
      fallback_1: "claude-4.6-sonnet"
      fallback_2: "qwen-3-max"
    
    # Used only when explicitly requested via --critical flag (High reasoning)
    critical:
      id: "claude-4.6-opus"
      fallback_1: "gpt-5-omni"
      fallback_2: "o4-mini"

execution:
  # Parallelism is OFF by default to save costs. 
  # Activated only for 'critical' tasks via CLI flag.
  parallel_execution: false
  
  # Validate that the LLM output is well-formed XML
  validate_xml: true
  
  # If validation fails, retry on the same provider with a corrective prompt
  max_retries: 2
