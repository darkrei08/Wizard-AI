<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wizard-AI Local Hub - Ecosistema AI locale, sicuro e ottimizzato con RTK.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://github.com data:; connect-src 'self'">
    <title>Wizard-AI Hub — Premium Context Optimizer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <!-- Chart.js for Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" integrity="sha384-xjs52BwK6Z1V7E0L7m2i3tO88Z3Wl6e/uX0K7G/I8T27P8B/G5l4M/P4lH5GZ1kM" crossorigin="anonymous"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Top Live Status Bar -->
        <header class="top-status-bar animate-fade-in">
            <div class="status-item">
                <span class="badge badge-neon">v0.49.0</span>
                <span class="text-secondary">Definitive Autonomous Engine</span>
            </div>
            <div class="flex gap-4 items-center">
                <div class="status-item">
                    <span>⚡ <strong id="live-top-tokens" style="color: #22d3ee;">68,420</strong> Token Risparmiati</span>
                    <span class="badge badge-success" id="live-top-ratio">-78% Avg</span>
                </div>
                <div class="status-item" style="border-left: 1px solid var(--glass-border); padding-left: 1rem;">
                    <span>🗜️ RTK Engine: <strong style="color: #10b981;">Active (&lt;10ms)</strong></span>
                </div>
                <div class="status-item" style="border-left: 1px solid var(--glass-border); padding-left: 1rem;">
                    <span>🛡️ <span class="text-secondary">Local Air-Gapped Mode</span></span>
                </div>
            </div>
        </header>

        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>🧙‍♂️ Wizard-AI</h2>
                <span class="badge badge-primary" style="width: fit-content;">Local Hub & Optimization</span>
            </div>
            
            <ul class="nav-links">
                <li><a href="#" data-route="home" class="active"><span class="icon">🏠</span> Home</a></li>
                <li><a href="#" data-route="dashboard"><span class="icon">📊</span> Dashboard</a></li>
                <li><a href="#" data-route="rtk-monitor"><span class="icon">🗜️</span> RTK Monitor <span class="badge badge-neon" style="margin-left:auto; font-size: 0.65rem;">NEW</span></a></li>
                <li><a href="#" data-route="cli-sim"><span class="icon">💻</span> CLI Simulator <span class="badge badge-primary" style="margin-left:auto; font-size: 0.65rem;">LIVE</span></a></li>
                <li><a href="#" data-route="installer"><span class="icon">📦</span> Installazione</a></li>
                <li><a href="#" data-route="chat"><span class="icon">💬</span> Chat AI</a></li>
                <li><a href="#" data-route="marketplace"><span class="icon">🏪</span> Marketplace</a></li>
            </ul>

            <div class="sidebar-footer">
                <div class="user-status" id="user-status-container">
                    <!-- Injected by auth.js -->
                    <button class="btn btn-outline w-full" id="btn-login"><span class="icon">🔒</span> Accedi Creatore</button>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content" id="app-content">
            <!-- Dynamic content injected here by app.js -->
        </main>

        <!-- Mobile Toggle -->
        <button class="mobile-nav-toggle" id="mobile-nav-toggle" aria-label="Apri menu mobile">
            <span class="icon">☰</span>
        </button>
    </div>

    <!-- Scripts -->
    <script src="js/telemetry.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/installer.js"></script>
    <script src="js/marketplace.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
